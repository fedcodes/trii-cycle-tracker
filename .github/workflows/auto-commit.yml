name: Auto Commit Changes

on:
  schedule:
    # Runs every Friday at 9:10 AM UTC
    # Adjust timezone as needed (UTC is default for GitHub Actions)
    - cron: '10 9 * * 5'
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Check for changes
        id: check_changes
        run: |
          git add -A
          if git diff --staged --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes to commit"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected"
          fi

      - name: Commit changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git commit -m "chore: auto-commit weekly changes [skip ci]

          Automated commit from GitHub Actions

          🤖 Generated via scheduled workflow"

      - name: Push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git push
